<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Local PakV5 Cache</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.45 -apple-system, "Segoe UI", system-ui, sans-serif;
    color: #17211d;
    background: #f5f3ee;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 4;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 10px 14px;
    background: #fffdf8;
    border-bottom: 1px solid #d9d0bf;
  }
  header h1 {
    margin: 0 10px 0 0;
    font-size: 17px;
    white-space: nowrap;
  }
  .page-nav { display: inline-flex; gap: 6px; flex-wrap: wrap; }
  .page-nav a {
    min-height: 32px;
    display: inline-flex;
    align-items: center;
    padding: 6px 9px;
    border: 1px solid #c9c0ac;
    border-radius: 6px;
    color: #17211d;
    background: #fff;
    text-decoration: none;
    white-space: nowrap;
  }
  input, select, button {
    min-height: 36px;
    padding: 7px 10px;
    border: 1px solid #c9c0ac;
    border-radius: 6px;
    font: inherit;
    background: #fff;
    color: #17211d;
  }
  input { flex: 1; min-width: 250px; }
  header select.folder-select { min-width: 260px; max-width: 420px; }
  button { cursor: pointer; }
  button.primary {
    border-color: #25614e;
    background: #25614e;
    color: #fff;
  }
  button:disabled { opacity: 0.55; cursor: not-allowed; }
  main {
    max-width: 1500px;
    margin: 0 auto;
    padding: 12px 14px 28px;
  }
  .banner {
    margin-bottom: 12px;
    padding: 10px 12px;
    border: 1px solid #d8d1c4;
    border-radius: 8px;
    background: #fffdf8;
    color: #4f5b55;
  }
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 10px;
    margin-bottom: 12px;
  }
  .metric {
    border: 1px solid #e0d7c9;
    border-radius: 8px;
    background: #fff;
    padding: 10px 12px;
    min-width: 0;
  }
  .metric .label {
    color: #67716c;
    font-size: 12px;
  }
  .metric .value {
    margin-top: 3px;
    font-size: 20px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .table-wrap {
    border: 1px solid #ded5c6;
    border-radius: 8px;
    background: #fff;
    overflow: auto;
  }
  table {
    width: 100%;
    min-width: 1120px;
    border-collapse: collapse;
  }
  th, td {
    padding: 8px 10px;
    border-bottom: 1px solid #eee7dc;
    text-align: left;
    vertical-align: top;
  }
  th {
    position: sticky;
    top: 0;
    z-index: 1;
    background: #f9f6ef;
    color: #4e5a54;
    font-size: 12px;
    font-weight: 700;
  }
  tbody tr:hover { background: #faf7f0; }
  .mono { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
  .path { word-break: break-all; max-width: 560px; }
  .file-name { font-weight: 700; word-break: break-all; }
  .muted { color: #6b746f; }
  .status {
    min-height: 30px;
    padding: 8px 0;
    color: #4e5a54;
  }
  .extract-panel {
    margin-bottom: 12px;
    padding: 10px 12px;
    border: 1px solid #cfe2d3;
    border-radius: 8px;
    background: #f3faf5;
    display: none;
    gap: 6px;
  }
  .extract-panel.visible { display: grid; }
  .extract-panel a {
    color: #155a44;
    font-weight: 700;
    word-break: break-all;
  }
  .browser-grid {
    display: grid;
    grid-template-columns: 300px minmax(0, 1fr);
    gap: 12px;
    align-items: start;
  }
  .folder-panel {
    border: 1px solid #ded5c6;
    border-radius: 8px;
    background: #fff;
    overflow: hidden;
    max-height: calc(100vh - 210px);
    position: sticky;
    top: 66px;
  }
  .folder-head {
    padding: 9px 10px;
    font-weight: 700;
    color: #4e5a54;
    background: #f9f6ef;
    border-bottom: 1px solid #eee7dc;
  }
  .folder-list {
    display: grid;
    overflow: auto;
    max-height: calc(100vh - 250px);
  }
  .folder-list button {
    border: 0;
    border-bottom: 1px solid #f0e9df;
    border-radius: 0;
    min-height: 32px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    text-align: left;
    background: #fff;
  }
  .folder-list button:hover { background: #faf7f0; }
  .folder-list button.active {
    background: #eaf4ef;
    color: #155a44;
    font-weight: 700;
  }
  .folder-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .folder-count { color: #6b746f; font-size: 12px; }
  .content-panel { min-width: 0; }
  .pager {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    padding: 2px 7px;
    border: 1px solid #d8d1c4;
    border-radius: 999px;
    background: #f8f5ee;
    color: #53605a;
    font-size: 12px;
    white-space: nowrap;
  }
  @media (max-width: 720px) {
    header h1 { flex-basis: 100%; }
    input, select, button { width: 100%; }
    .browser-grid { grid-template-columns: 1fr; }
    .folder-panel { position: static; max-height: 260px; }
    .folder-list { max-height: 220px; }
  }
</style>
</head>
<body>
<header>
  <h1>Local PakV5 Cache</h1>
  <nav class="page-nav" aria-label="Pages"><a href="/ability-matcher.html">Ability Matcher</a><a href="/cdn-resource-browser.html">CDN Browser</a></nav>
  <input id="search" placeholder="Search paths, extensions, hashes" autocomplete="off" />
  <select id="mode">
    <option value="known" selected>Known logical paths</option>
    <option value="raw">Raw FN/IDX records</option>
  </select>
  <select id="folder" class="folder-select">
    <option value="">All folders</option>
  </select>
  <button id="reload" class="primary">Reload</button>
</header>
<main>
  <div class="banner" id="banner">Local PakV5 cache only. This page does not use the online CDN list or native live download buffer.</div>
  <section class="summary" id="summary"></section>
  <section class="extract-panel" id="extractPanel">
    <strong id="extractTitle">Extracted</strong>
    <div id="extractDetail" class="muted"></div>
    <a id="extractLink" href="#" target="_blank" rel="noopener" download>Open extracted file</a>
  </section>
  <div class="status" id="status">Loading local PakV5 cache...</div>
  <div class="browser-grid">
    <aside class="folder-panel">
      <div class="folder-head">Folders</div>
      <div class="folder-list" id="folderList"></div>
    </aside>
    <div class="content-panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>File / Hash</th>
              <th>Kind</th>
              <th>Ext</th>
              <th>Original</th>
              <th>Stored</th>
              <th>Compression</th>
              <th>PakV5 Slot</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div class="pager">
        <div id="pageMeta" class="muted"></div>
        <div>
          <button id="prev">Prev</button>
          <button id="next">Next</button>
        </div>
      </div>
    </div>
  </div>
</main>
<script>
const state = { mode: 'known', search: '', folder: '', offset: 0, limit: 200, last: null };
const els = {
  search: document.getElementById('search'),
  mode: document.getElementById('mode'),
  folder: document.getElementById('folder'),
  reload: document.getElementById('reload'),
  summary: document.getElementById('summary'),
  extractPanel: document.getElementById('extractPanel'),
  extractTitle: document.getElementById('extractTitle'),
  extractDetail: document.getElementById('extractDetail'),
  extractLink: document.getElementById('extractLink'),
  status: document.getElementById('status'),
  folderList: document.getElementById('folderList'),
  rows: document.getElementById('rows'),
  pageMeta: document.getElementById('pageMeta'),
  prev: document.getElementById('prev'),
  next: document.getElementById('next'),
};

function formatInt(value) {
  return Number(value || 0).toLocaleString();
}

function formatBytes(value) {
  const number = Number(value || 0);
  if (!Number.isFinite(number)) return '-';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  let size = number;
  let unit = 0;
  while (size >= 1024 && unit < units.length - 1) {
    size /= 1024;
    unit += 1;
  }
  return `${size.toFixed(unit ? 1 : 0)} ${units[unit]}`;
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function metric(label, value) {
  return `<div class="metric"><div class="label">${escapeHtml(label)}</div><div class="value" title="${escapeHtml(value)}">${escapeHtml(value)}</div></div>`;
}

function renderSummary(data) {
  const stats = data.stats || {};
  const known = data.knownSummary || {};
  els.summary.innerHTML = [
    metric('FN mappings', formatInt(stats.fnMappings)),
    metric('IDX content records', formatInt(stats.idxRecords)),
    metric('Known logical paths', known.knownLogicalPaths == null ? '-' : formatInt(known.knownLogicalPaths)),
    metric('Original bytes', formatBytes(stats.totalOriginalSize)),
    metric('Stored bytes', formatBytes(stats.totalCompressedSize)),
    metric('DAT files', formatInt((stats.datFiles || []).length)),
  ].join('');
}

function renderFolders(data) {
  const folders = data.knownSummary?.folders || [];
  const selected = state.folder;
  els.folder.disabled = state.mode !== 'known';
  const optionRows = ['<option value="">All folders</option>'];
  if (selected && !folders.some((entry) => entry.folder === selected)) {
    optionRows.push(`<option value="${escapeHtml(selected)}" selected>${escapeHtml(selected)}</option>`);
  }
  optionRows.push(...folders.slice(0, 240).map((entry) => `<option value="${escapeHtml(entry.folder)}"${entry.folder === selected ? ' selected' : ''}>${escapeHtml(entry.folder)} (${formatInt(entry.count)})</option>`));
  els.folder.innerHTML = optionRows.join('');

  if (state.mode !== 'known') {
    els.folderList.innerHTML = '<div class="muted" style="padding:10px;">Raw FN/IDX records have no folder names.</div>';
    return;
  }
  const buttons = [
    `<button data-folder="" class="${selected ? '' : 'active'}"><span class="folder-name">All folders</span><span class="folder-count">${formatInt(data.totalItems || 0)}</span></button>`,
    ...folders.slice(0, 120).map((entry) => `<button data-folder="${escapeHtml(entry.folder)}" class="${entry.folder === selected ? 'active' : ''}"><span class="folder-name" title="${escapeHtml(entry.folder)}">${escapeHtml(entry.folder)}</span><span class="folder-count">${formatInt(entry.count)}</span></button>`),
  ];
  els.folderList.innerHTML = buttons.join('');
}

function rowHtml(item) {
  const isKnown = !!item.logicalPath;
  const primary = isKnown
    ? `<div class="file-name">${escapeHtml(item.fileName || item.logicalPath)}</div><div class="path muted">${escapeHtml(item.folder || '')}</div><div class="muted mono">${escapeHtml(item.h1)} / ${escapeHtml(item.h2)}</div>`
    : `<div class="mono">${escapeHtml(item.h1)} / ${escapeHtml(item.h2)}</div><div class="muted">${escapeHtml(item.fnFile || '')}</div>`;
  const slot = isKnown
    ? `dat${escapeHtml(item.datIndex)} @ ${formatInt(item.datOffset)}`
    : `${escapeHtml(item.datFile || '-')} @ ${formatInt(item.datOffset)}`;
  const action = isKnown
    ? `<button data-extract="${escapeHtml(item.logicalPath)}">Extract</button>`
    : '<span class="muted">hash only</span>';
  return `<tr>
    <td>${formatInt(item.index)}</td>
    <td>${primary}</td>
    <td><span class="pill">${escapeHtml(item.kind || 'raw')}</span></td>
    <td>${escapeHtml(item.ext || '-')}</td>
    <td>${formatBytes(item.originalSize)}</td>
    <td>${formatBytes(item.compressedSize)}</td>
    <td>${escapeHtml(item.compressionType ?? '-')}</td>
    <td class="mono">${slot}</td>
    <td>${action}</td>
  </tr>`;
}

function renderRows(data) {
  const items = data.items || [];
  els.rows.innerHTML = items.length ? items.map(rowHtml).join('') : '<tr><td colspan="9" class="muted">No local PakV5 rows matched.</td></tr>';
  const start = data.totalFiltered ? data.offset + 1 : 0;
  const end = data.offset + items.length;
  els.pageMeta.textContent = `${formatInt(start)}-${formatInt(end)} of ${formatInt(data.totalFiltered)} filtered, ${formatInt(data.totalItems)} total`;
  els.prev.disabled = data.offset <= 0;
  els.next.disabled = !data.hasNextPage;
}

function renderExtractResult(logicalPath, data) {
  els.extractPanel.classList.add('visible');
  els.extractTitle.textContent = `Extracted ${data.localFile?.size ? formatBytes(data.localFile.size) : ''}`.trim();
  els.extractDetail.textContent = `${logicalPath} -> ${data.localFile.relativePath}`;
  els.extractLink.href = data.localFile.servedUrl || '#';
  els.extractLink.textContent = `Open ${data.localFile.relativePath}`;
}

async function loadList(resetOffset = true) {
  if (resetOffset) state.offset = 0;
  state.mode = els.mode.value;
  state.search = els.search.value.trim();
  state.folder = state.mode === 'known' ? els.folder.value : '';
  els.status.textContent = state.mode === 'known' ? 'Matching local catalog names against PakV5 hashes...' : 'Reading PakV5 FN/IDX records...';
  const params = new URLSearchParams({ mode: state.mode, search: state.search, folder: state.folder, offset: String(state.offset), limit: String(state.limit) });
  const response = await fetch(`/api/local-pakv5/file-list?${params}`);
  const data = await response.json();
  if (!response.ok || !data.ok) throw new Error(data.error || `HTTP ${response.status}`);
  state.last = data;
  renderSummary(data);
  renderFolders(data);
  renderRows(data);
  const folderText = data.folder ? ` Folder: ${data.folder}.` : '';
  els.status.textContent = `${data.note || 'Loaded.'}${folderText}`;
}

async function extract(logicalPath, button) {
  button.disabled = true;
  button.textContent = 'Extracting';
  try {
    const response = await fetch('/api/local-pakv5/extract', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ logicalPath }),
    });
    const data = await response.json();
    if (!response.ok || !data.ok) throw new Error(data.error || `HTTP ${response.status}`);
    button.textContent = 'Extracted';
    renderExtractResult(logicalPath, data);
    els.status.textContent = `Extracted ${logicalPath} -> ${data.localFile.relativePath} (${formatBytes(data.localFile.size)})`;
  } catch (error) {
    button.disabled = false;
    button.textContent = 'Extract';
    els.status.textContent = `Extract failed: ${error.message || error}`;
  }
}

let searchTimer = null;
els.search.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadList(true).catch((error) => { els.status.textContent = `Load failed: ${error.message || error}`; }), 250);
});
els.mode.addEventListener('change', () => loadList(true).catch((error) => { els.status.textContent = `Load failed: ${error.message || error}`; }));
els.folder.addEventListener('change', () => loadList(true).catch((error) => { els.status.textContent = `Load failed: ${error.message || error}`; }));
els.reload.addEventListener('click', () => loadList(true).catch((error) => { els.status.textContent = `Load failed: ${error.message || error}`; }));
els.prev.addEventListener('click', () => {
  state.offset = Math.max(0, state.offset - state.limit);
  loadList(false).catch((error) => { els.status.textContent = `Load failed: ${error.message || error}`; });
});
els.next.addEventListener('click', () => {
  state.offset += state.limit;
  loadList(false).catch((error) => { els.status.textContent = `Load failed: ${error.message || error}`; });
});
els.rows.addEventListener('click', (event) => {
  const button = event.target.closest('button[data-extract]');
  if (!button) return;
  extract(button.dataset.extract, button);
});
els.folderList.addEventListener('click', (event) => {
  const button = event.target.closest('button[data-folder]');
  if (!button) return;
  els.folder.value = button.dataset.folder || '';
  loadList(true).catch((error) => { els.status.textContent = `Load failed: ${error.message || error}`; });
});

loadList(true).catch((error) => { els.status.textContent = `Load failed: ${error.message || error}`; });
</script>
</body>
</html>
