<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JX3 Client Monitor Animation Player</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #05070a; color: #d8e4f0; font-family: "Segoe UI", Arial, sans-serif; }
    body.embed-client-monitor .jx3-topbar-host { display: none !important; }
    #stage { position: fixed; inset: 0; overflow: hidden; background: #05070a; }
    #viewport { display: block; width: 100%; height: 100%; }
    #hud { position: fixed; left: 10px; top: 10px; right: 10px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; pointer-events: none; }
    body:not(.embed-client-monitor) #hud { top: 88px; }
    .panel { max-width: min(620px, 100%); border: 1px solid rgba(120, 154, 190, 0.26); background: rgba(5, 8, 12, 0.72); backdrop-filter: blur(8px); border-radius: 8px; padding: 8px 10px; box-shadow: 0 14px 36px rgba(0, 0, 0, 0.3); }
    .title { font-size: 12px; font-weight: 800; letter-spacing: 0; color: #f4f8ff; }
    .line { margin-top: 4px; color: #94a8bc; font: 11px Consolas, monospace; overflow-wrap: anywhere; }
    .badge { display: inline-block; margin-right: 6px; padding: 2px 6px; border-radius: 999px; border: 1px solid rgba(120, 154, 190, 0.28); color: #d8e4f0; background: rgba(18, 26, 34, 0.88); font-size: 11px; }
    .badge.ok { color: #bfe6a5; border-color: rgba(141, 196, 118, 0.45); }
    .badge.blocked { color: #ffd28a; border-color: rgba(235, 172, 84, 0.5); }
    .issues { margin-top: 6px; display: grid; gap: 3px; max-height: 96px; overflow: hidden; }
    .issue { font: 11px Consolas, monospace; color: #ffd28a; overflow-wrap: anywhere; }
    .issue.warn { color: #c2d3e5; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "/vendor/three/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="stage"><canvas id="viewport"></canvas></div>
  <div id="hud">
    <div class="panel">
      <div class="title" id="title">New animation player</div>
      <div class="line" id="subtitle">waiting</div>
      <div class="line" id="counts"></div>
      <div class="issues" id="issues"></div>
    </div>
  </div>
  <script type="module" src="js/client-monitor-animation-player.js"></script>
</body>
</html>
