<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JX3 Full Viewer</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #0b0f14;
      color: #d7dee6;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    #canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #toolbar {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 50;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      background: rgba(8, 10, 14, 0.9);
      border: 1px solid rgba(150, 180, 210, 0.25);
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }

    #toolbar select,
    #toolbar button {
      height: 30px;
      border-radius: 6px;
      border: 1px solid rgba(140, 165, 190, 0.35);
      background: rgba(23, 31, 42, 0.95);
      color: #d7dee6;
      padding: 0 10px;
      font-size: 12px;
    }

    #toolbar select {
      min-width: 340px;
    }

    #toolbar button {
      cursor: pointer;
    }

    #toolbar button:hover {
      border-color: rgba(173, 210, 246, 0.65);
      background: rgba(35, 48, 65, 0.95);
    }

    #status {
      color: #9fb3c8;
      font-size: 12px;
      white-space: nowrap;
    }

    #info {
      position: fixed;
      left: 10px;
      bottom: 10px;
      z-index: 45;
      padding: 10px 12px;
      min-width: 320px;
      background: rgba(8, 10, 14, 0.85);
      border: 1px solid rgba(150, 180, 210, 0.25);
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      color: #c7d0d9;
      pointer-events: none;
    }

    #help {
      position: fixed;
      right: 10px;
      bottom: 10px;
      z-index: 45;
      max-width: 360px;
      padding: 8px 10px;
      background: rgba(8, 10, 14, 0.85);
      border: 1px solid rgba(150, 180, 210, 0.2);
      border-radius: 8px;
      font-size: 11px;
      line-height: 1.5;
      color: #aab8c5;
      pointer-events: none;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.75);
      z-index: 100;
    }

    #loading h1 {
      margin: 0;
      font-size: 24px;
      color: #d9c6a2;
      letter-spacing: 1px;
    }

    #loading p {
      margin: 8px 0 0;
      color: #b0bac7;
      font-size: 13px;
    }

    #loading .bar {
      margin-top: 12px;
      width: 420px;
      max-width: calc(100vw - 60px);
      height: 6px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      overflow: hidden;
    }

    #loading .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6aa06f, #a3c087);
      transition: width 0.2s;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="toolbar">
    <select id="package-select"></select>
    <button id="refresh-packages" type="button">Refresh</button>
    <button id="load-package" type="button">Load</button>
    <button id="open-resources" type="button">Resources</button>
    <button id="open-validator" type="button">Validate</button>
    <span id="status">Ready</span>
  </div>

  <div id="info">
    <div id="info-package">Package: -</div>
    <div id="info-cam">Cam: 0, 0, 0</div>
    <div id="info-fps">FPS: -</div>
    <div id="info-objects">Objects: -</div>
    <div id="info-region">Region: -</div>
  </div>

  <div id="help">
    Click canvas to lock mouse. WASD move, Space/Ctrl up/down, Shift sprint, wheel speed, G gravity toggle.
  </div>

  <div id="loading">
    <h1>Loading Full Export</h1>
    <p id="loading-text">Preparing...</p>
    <div class="bar"><div class="fill" id="loading-fill"></div></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "./lib/three.module.js"
    }
  }
  </script>
  <script type="module" src="js/full-viewer.js"></script>
</body>
</html>
